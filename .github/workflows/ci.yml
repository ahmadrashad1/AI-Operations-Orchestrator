name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-quality:
    name: API quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Restore API wheelhouse cache
        id: api-wheelhouse-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/api-wheelhouse
          key: api-wheelhouse-${{ runner.os }}-${{ hashFiles('apps/api/pyproject.toml') }}
          restore-keys: |
            api-wheelhouse-${{ runner.os }}-

      - name: Warm API wheelhouse cache
        if: steps.api-wheelhouse-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.cache/api-wheelhouse
          python -m pip wheel --wheel-dir ~/.cache/api-wheelhouse setuptools wheel ".[dev]"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]" --no-index --find-links ~/.cache/api-wheelhouse

      - name: Verify imports compile
        run: python -m compileall app tests

      - name: Lint API
        continue-on-error: true
        run: ruff check .

      - name: Run API tests (capture exit code)
        run: |
          set +e
          pytest -q --junitxml=pytest-results.xml
          echo $? > pytest-rc.txt
          set -e

      - name: Upload API pytest results
        uses: actions/upload-artifact@v7
        with:
          name: api-pytest-results-${{ github.run_id }}
          path: |
            pytest-results.xml
            pytest-rc.txt

      - name: Fail if tests failed
        run: |
          RC=$(cat pytest-rc.txt || echo 0)
          if [ "$RC" != "0" ]; then
            echo "Pytest failed with code $RC"
            exit $RC
          fi

  web-quality:
    name: Web quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Typecheck web app
        run: npm run typecheck

      - name: Build web app
        run: npm run build

  container-smoke:
    name: Container smoke builds
    runs-on: ubuntu-latest
    needs: [api-quality, web-quality]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate compose file
        run: docker compose config

      - name: Build API image with cache
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          load: true
          tags: ai-operations-orchestrator-api:ci
          cache-from: type=gha,scope=api-smoke
          cache-to: type=gha,mode=max,scope=api-smoke

      - name: Build web image with cache
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          load: true
          tags: ai-operations-orchestrator-web:ci
          cache-from: type=gha,scope=web-smoke
          cache-to: type=gha,mode=max,scope=web-smoke

  container-test:
    name: Container test (build api-test and run pytest)
    runs-on: ubuntu-latest
    needs: [container-smoke]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Start required services (postgres, redis)
        run: |
          docker compose up -d postgres redis

      - name: Wait for Postgres to be ready
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U orchestrator -d orchestrator && break || sleep 1
          done

      - name: Build api-test image with cache
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          target: test
          load: true
          tags: ai-operations-orchestrator-api-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Python on runner for integration tests
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install API dependencies (for integration tests)
        run: |
          python -m pip install --upgrade pip
          pip install "./apps/api[dev]"

      - name: Run Postgres-backed integration tests
        env:
          APP_DATABASE_URL: postgresql+psycopg://orchestrator:orchestrator@localhost:5432/orchestrator
        run: |
          pytest -q apps/api/tests/test_postgres_users.py

      - name: Run tests inside api-test image
        run: docker compose run --rm --no-deps api-test

