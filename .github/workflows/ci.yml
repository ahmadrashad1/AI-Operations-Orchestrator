name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-quality:
    name: API quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify imports compile
        run: python -m compileall app tests

      - name: Lint API
        run: ruff check .

      - name: Run API tests
        run: pytest -q

  web-quality:
    name: Web quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Typecheck web app
        run: npm run typecheck

      - name: Build web app
        run: npm run build

  container-smoke:
    name: Container smoke builds
    runs-on: ubuntu-latest
    needs: [api-quality, web-quality]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate compose file
        run: docker compose config

      - name: Build API image
        run: docker build --file apps/api/Dockerfile --tag ai-operations-orchestrator-api:ci apps/api

      - name: Build web image
        run: docker build --file apps/web/Dockerfile --tag ai-operations-orchestrator-web:ci apps/web

