# Alembic configuration file

# This is the main Alembic configuration file.
# See the Alembic documentation for full configuration options.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to os.environ['TZ'] set before importing datetime module.
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field when generating a new migration
# compared against the filename_character_set
# see the documentation for more info
# filename_character_set = -/_
# sqlalchemy.url driver://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic.runtime.migration

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic.runtime.migration]
level = INFO
handlers =
qualname = alembic.runtime.migration

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
